<!DOCTYPE html>
<html>
<head>

<title>Predict HDI</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin: 0;
    background: url('https://images.unsplash.com/photo-1526772662000-3f88f10405ff');
    background-size: cover;
    background-position: center;
    height: 100vh;
}

.overlay{
    background: rgba(0,0,0,0.65);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    width: 500px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

h1{
    text-align: center;
    color: white;
    margin-bottom: 25px;
}

input,
select{
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    box-sizing: border-box;
}

button{
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    background: #00b894;
    border: none;
    color: white;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background: #019875;
}

.home{
    text-align: center;
    margin-top: 20px;
}

.home a{
    text-decoration: none;
    color: white;
    font-size: 17px;
}

</style>

</head>

<body>

<div class="overlay">

<div class="container">

<h1>🌍 HDI Predictor</h1>

<form action="/predict" method="post">

<select name="Country" required>
    <option value="">Select Country</option>
    <option value="0">Afghanistan</option>
    <option value="7">Australia</option>
    <option value="12">Bangladesh</option>
    <option value="29">Canada</option>
    <option value="74">India</option>
    <option value="131">Poland</option>
    <option value="167">Turkey</option>
</select>

<input
type="number"
step="any"
name="Expected_Years_Schooling"
placeholder="Expected Years of Schooling"
required>

<input
type="number"
step="any"
name="Mean_Years_Schooling"
placeholder="Mean Years of Schooling"
required>

<input
type="number"
step="any"
name="GNI_Per_Capita"
placeholder="Gross National Income Per Capita"
required>

<button type="submit">
Predict HDI
</button>

</form>

<div class="home">
<a href="/Home">⬅ Back Home</a>
</div>

</div>

</div>

</body>
</html>
