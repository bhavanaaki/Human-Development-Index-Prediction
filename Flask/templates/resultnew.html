<!DOCTYPE html>
<html>
<head>

<title>HDI Prediction Result</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin: 0;
    background: url('https://images.unsplash.com/photo-1526772662000-3f88f10405ff');
    background-size: cover;
    background-position: center;
    height: 100vh;
}

.overlay{
    background: rgba(0,0,0,0.65);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card{
    background: rgba(255,255,255,0.95);
    padding: 40px;
    border-radius: 20px;
    width: 500px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

h1{
    color: #2d3436;
    margin-bottom: 20px;
}

.result{
    font-size: 30px;
    color: #0984e3;
    font-weight: bold;
    margin-top: 15px;
}

a{
    display: inline-block;
    margin-top: 25px;
    background: #00b894;
    color: white;
    text-decoration: none;
    padding: 12px 25px;
    border-radius: 10px;
    transition: 0.3s;
}

a:hover{
    background: #019875;
}

</style>

</head>

<body>

<div class="overlay">

<div class="card">

<h1>🌍 Human Development Index</h1>

<div class="result">
{{ prediction_text }}
</div>

<a href="/Prediction">
Predict Again
</a>

</div>

</div>

</body>
</html>
